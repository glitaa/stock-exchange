events {
    worker_connections 1024;
}

http {
    upstream exchange_backend {
        server app-1:8080;
        server app-2:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://exchange_backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}